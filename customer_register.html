<!DOCTYPE html>
<html>
<head>
    <title>Create Account | SnackApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">Join SnackApp 🥨</h2>
                        <p class="text-center text-muted">Save your orders and track deliveries faster.</p>
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary w-100 mt-3">Create Customer Account</button>
                        </form>
                        <hr>
                        <div class="text-center">
                            <p>Already a member? <a href="{% url 'login' %}">Sign In</a></p>
                            
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
