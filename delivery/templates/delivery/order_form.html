<!DOCTYPE html>
<html>
<head>
    <title>Order Your Snacks 🍿</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">


<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'Home' %}">SnackApp</a>
        <div>
            {% if user.is_authenticated %}
                <span class="text-light me-3">Hi, {{ user.username }}</span>
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Business Login</a>
            {% endif %}
        </div>
    </div>
</nav>


<div class="container py-5">
    <h1 class="text-center mb-5">🛒 Build Your Snack Box</h1>
    
    <form method="POST" class="mx-auto" style="max-width: 800px;">
        {% csrf_token %}
        
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="mb-3">
                    {% if user.is_authenticated %}
                        <label class="form-label">Your Name</label>
                        <input type="text" name="name" class="form-control" value="{{ user.first_name }} {{ user.last_name }}" required>
                    {% else %}
                        <label class="form-label">Your Name</label>
                        <input type="text" name="name" class="form-control" required>
                    {% endif %}
                </div>
                <div class="mb-3">
                    <label class="form-label">Delivery Address</label>
                    <input type="text" name="address" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Your Secret Code</label>
                    <input type="text" name="code" class="form-control" required>
                </div>
            </div>
        </div>

        <div class="row">
            {% for snack in inventory %}
            <div class="col-md-6 mb-3">
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-0">{{ snack.name }}</h5>
                            <small class="text-success">${{ snack.price }} each</small>
                        </div>
                        <div style="width: 80px;">
                            <input type="number" name="snack_{{ snack.id }}" class="form-control" value="0" min="0">
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 mt-4">Place Order & Track 🚀</button>
    </form>
</div>
</body>
</html>
